<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Soulslike Pokemon Battle — Roster Mock</title>
  <style>
    :root { color-scheme: dark; --line: #2c4a5e; --text: #edf7ff; --muted: #8aa6b8; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%; overflow: hidden;
      background: radial-gradient(circle at 50% 16%, rgba(60,90,100,.35), transparent 45%), linear-gradient(180deg,#05080b 0%,#020406 100%);
      color: var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    body { display: grid; grid-template-rows: minmax(0,1fr) auto; gap: 10px; padding: 14px; }
    .wrap { display: flex; align-items: center; justify-content: center; min-height: 0; }
    canvas {
      width: min(100%, calc((100vh - 108px) * 16 / 9)); max-width: 1240px; aspect-ratio: 16 / 9;
      border: 1px solid var(--line); border-radius: 6px; background: #04070a;
      box-shadow: 0 26px 80px rgba(0,0,0,.6), inset 0 0 0 1px rgba(120,170,190,.06);
    }
    .controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
    .chip { border: 1px solid #2a4658; border-radius: 6px; padding: 8px 10px; background: rgba(14,22,30,.9); color: var(--muted); font-size: 12px; line-height: 1; }
    .chip b { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap"><canvas id="game" width="960" height="540"></canvas></div>
  <div class="controls">
    <span class="chip"><b>1–6</b> pick Pokémon</span>
    <span class="chip"><b>WASD / Arrows</b> move</span>
    <span class="chip"><b>J</b> light</span>
    <span class="chip"><b>K</b> heavy</span>
    <span class="chip"><b>L</b> dodge</span>
    <span class="chip"><b>U / I / O</b> specials</span>
    <span class="chip"><b>R</b> retry</span>
    <span class="chip"><b>🎮 Xbox</b> stick move · A/X attack · B dodge · Y/LB/RB specials · LT/RT swap</span>
  </div>

  <script>
  "use strict";
  // ===========================================================================
  // Canvas + crisp DPR scaling
  // ===========================================================================
  const c = document.getElementById("game");
  const g = c.getContext("2d");
  const W = 960, H = 540;
  const DPR = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
  c.width = W * DPR; c.height = H * DPR;
  g.scale(DPR, DPR); g.imageSmoothingEnabled = true; g.lineJoin = "round"; g.lineCap = "round";

  // ===========================================================================
  // Helpers
  // ===========================================================================
  const TAU = Math.PI * 2;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const rnd = (a, b) => a + Math.random() * (b - a);
  const hypot = Math.hypot;
  const dist = (a, q) => hypot(a.x - q.x, a.y - q.y);
  const norm = (x, y) => { const l = hypot(x, y) || 1; return { x: x / l, y: y / l }; };
  const hash = n => { const s = Math.sin(n * 127.1) * 43758.5453; return s - Math.floor(s); };
  const crom = (a, p1, p2, d, t) => { const t2 = t*t, t3 = t2*t; return 0.5*((2*p1)+(-a+p2)*t+(2*a-5*p1+4*p2-d)*t2+(-a+3*p1-3*p2+d)*t3); };
  function rr(x, y, w, h, r) { r = Math.min(r, h/2, w/2); g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
  function oval(x, y, rx, ry) { g.beginPath(); g.ellipse(x, y, rx, ry, 0, 0, TAU); g.fill(); }
  // local-space draw primitives for species art (radii, not full w/h)
  function el(x, y, rx, ry, col) { g.fillStyle = col; g.beginPath(); g.ellipse(x, y, rx, ry, 0, 0, TAU); g.fill(); }
  function ci(x, y, r, col) { el(x, y, r, r, col); }
  function tri(ax, ay, bx, by, cx, cy, col) { g.fillStyle = col; g.beginPath(); g.moveTo(ax, ay); g.lineTo(bx, by); g.lineTo(cx, cy); g.closePath(); g.fill(); }
  function lighten(hex, amt) { hex = hex.replace("#",""); let r=parseInt(hex.slice(0,2),16), gg=parseInt(hex.slice(2,4),16), bb=parseInt(hex.slice(4,6),16); const t = amt>0?255:0, k=Math.abs(amt); r=Math.round(r+(t-r)*k); gg=Math.round(gg+(t-gg)*k); bb=Math.round(bb+(t-bb)*k); return `rgb(${r},${gg},${bb})`; }
  let curScale = 1, lowDetail = false, gaitPhase = 0, comboPop = 0;
  // shaded, outlined main body form — turns flat vector shapes into sprite-like volumes
  function bodyEl(x, y, rx, ry, base) {
    if (lowDetail) { el(x, y, rx, ry, base); return; }
    const lx = x + LIGHT.x*rx*0.45, ly = y + LIGHT.y*ry*0.45;
    const grad = g.createRadialGradient(lx, ly, Math.min(rx,ry)*0.15, x, y, Math.max(rx,ry)*1.12);
    grad.addColorStop(0, lighten(base,0.20)); grad.addColorStop(0.62, base); grad.addColorStop(1, lighten(base,-0.30));
    g.fillStyle = grad; g.beginPath(); g.ellipse(x, y, rx, ry, 0, 0, TAU); g.fill();
    g.lineWidth = 1.7/curScale; g.strokeStyle = lighten(base,-0.55); g.stroke();
  }

  const LIGHT = norm(-0.45, -0.9);

  // ===========================================================================
  // Global frame state
  // ===========================================================================
  let time = performance.now();
  let tPrev = time;
  let hitstop = 0, shake = 0, slow = 1, flash = 0, zoom = 1, introT = 0;
  let falls = 0, wins = 0;
  let camX = W/2, camY = H/2, kickX = 0, kickY = 0;
  let impact = 0, impactX = 0, impactY = 0;
  let groundFlash = 0, groundFlashX = 0, groundFlashY = 0;
  let dodgeBuf = 0, winT = 0, spinePts = null;
  const fx = [], texts = [], ghosts = [], dust = [], decals = [], shots = [];
  let log = "";

  for (let i = 0; i < 46; i++) dust.push({ x: rnd(0,W), y: rnd(H*0.4,H), r: rnd(0.6,2.2), vx: rnd(-6,6), vy: rnd(-16,-4), a: rnd(0.05,0.22) });
  const cracks = [];
  for (let k = 0; k < 5; k++) { const pts = []; let cx = rnd(W*0.28,W*0.72), cy = rnd(H*0.56,H*0.84), a = rnd(0,TAU); for (let s = 0; s < 5; s++) { pts.push({ x: cx, y: cy }); a += rnd(-0.8,0.8); const d = rnd(26,60); cx += Math.cos(a)*d; cy += Math.sin(a)*d*0.5; } cracks.push(pts); }
  const pebbles = [];
  for (let k = 0; k < 22; k++) pebbles.push({ x: rnd(80,W-80), y: rnd(H*0.50,H-30), r: rnd(2,6), s: rnd(0.4,0.9) });

  // ===========================================================================
  // Offscreen caches
  // ===========================================================================
  const arenaBg = document.createElement("canvas");
  arenaBg.width = W*DPR; arenaBg.height = H*DPR;
  const gb = arenaBg.getContext("2d"); gb.scale(DPR, DPR); gb.lineJoin = "round"; gb.lineCap = "round";
  (function bakeArena() {
    const hor = H*0.40;
    const sky = gb.createLinearGradient(0,0,0,H); sky.addColorStop(0,"#0a1016"); sky.addColorStop(0.42,"#0c151b"); sky.addColorStop(1,"#070b0f");
    gb.fillStyle = sky; gb.fillRect(-60,-60,W+120,H+120);
    for (let i=0;i<6;i++){ const px=60+i*(W-120)/5, pw=26; const pg=gb.createLinearGradient(px,0,px+pw,0); pg.addColorStop(0,"#0d161c"); pg.addColorStop(0.5,"#16242c"); pg.addColorStop(1,"#0a1217"); gb.fillStyle=pg; gb.fillRect(px-pw/2,0,pw,hor); gb.fillStyle="rgba(140,180,170,.05)"; gb.fillRect(px-pw/2,0,3,hor); }
    const sp = gb.createRadialGradient(W/2,H*0.52,40,W/2,H*0.5,W*0.62); sp.addColorStop(0,"rgba(130,160,150,.18)"); sp.addColorStop(1,"rgba(0,0,0,0)"); gb.fillStyle=sp; gb.fillRect(0,0,W,H);
    const fl = gb.createLinearGradient(0,hor,0,H); fl.addColorStop(0,"#17232a"); fl.addColorStop(1,"#0a1216"); gb.fillStyle=fl; gb.fillRect(-60,hor,W+120,H-hor+60);
    const vpx = W/2; gb.strokeStyle="rgba(120,160,170,.08)"; gb.lineWidth=1;
    for (let i=-7;i<=7;i++){ const bx=W/2+i*150; gb.beginPath(); gb.moveTo(bx,H); gb.lineTo(vpx,hor); gb.stroke(); }
    for (let i=1;i<=6;i++){ const t=i/6, yy=hor+(H-hor)*(t*t); gb.beginPath(); gb.moveTo(0,yy); gb.lineTo(W,yy); gb.stroke(); }
    for (const pb of pebbles){ gb.fillStyle=`rgba(40,48,52,${pb.s})`; gb.beginPath(); gb.ellipse(pb.x,pb.y,pb.r,pb.r*0.6,0,0,TAU); gb.fill(); gb.fillStyle="rgba(150,170,170,.12)"; gb.beginPath(); gb.ellipse(pb.x-pb.r*0.3,pb.y-pb.r*0.3,pb.r*0.4,pb.r*0.26,0,0,TAU); gb.fill(); }
    gb.save(); gb.translate(W/2,H*0.66); gb.scale(1,0.4); gb.strokeStyle="rgba(120,200,180,.16)"; gb.lineWidth=6; gb.beginPath(); gb.arc(0,0,320,0,TAU); gb.stroke(); gb.strokeStyle="rgba(236,203,115,.08)"; gb.lineWidth=2; gb.beginPath(); gb.arc(0,0,268,0,TAU); gb.stroke(); gb.restore();
  })();

  function makeGlow(rad, r, gc, bc) { const o = document.createElement("canvas"); o.width=o.height=rad*2; const og=o.getContext("2d"); const grd=og.createRadialGradient(rad,rad,0,rad,rad,rad); grd.addColorStop(0,`rgba(${r},${gc},${bc},1)`); grd.addColorStop(0.4,`rgba(${r},${gc},${bc},0.5)`); grd.addColorStop(1,`rgba(${r},${gc},${bc},0)`); og.fillStyle=grd; og.fillRect(0,0,rad*2,rad*2); return o; }
  const GLOW = makeGlow(32,255,255,255);
  const GLOW_WARM = makeGlow(32,255,160,70);
  const GLOW_COOL = makeGlow(32,150,210,255);
  const GLOW_GRASS = makeGlow(32,150,225,150);
  const glowFor = el => el === "water" ? GLOW_COOL : el === "grass" ? GLOW_GRASS : el === "fire" ? GLOW_WARM : GLOW;

  const bloomC = document.createElement("canvas"); bloomC.width = Math.floor(W/2); bloomC.height = Math.floor(H/2); const bgx = bloomC.getContext("2d");
  const VIGNETTE = g.createRadialGradient(W/2,H*0.52,H*0.3,W/2,H*0.52,H*0.9); VIGNETTE.addColorStop(0,"rgba(0,0,0,0)"); VIGNETTE.addColorStop(1,"rgba(0,0,0,.62)");
  const BOSS_VIGNETTE = g.createRadialGradient(W/2,H*0.52,H*0.25,W/2,H*0.52,H*0.85); BOSS_VIGNETTE.addColorStop(0,"rgba(255,40,30,0)"); BOSS_VIGNETTE.addColorStop(1,"rgba(255,40,30,1)");
  const LOWHP_VIGNETTE = g.createRadialGradient(W/2,H*0.52,H*0.2,W/2,H*0.52,H*0.85); LOWHP_VIGNETTE.addColorStop(0,"rgba(200,20,20,0)"); LOWHP_VIGNETTE.addColorStop(1,"rgba(200,20,20,1)");

  const ONIX_N = 16;
  const onixR = f => 32*(1-f) + 10*f;
  const boulderCache = {};
  function getBoulderSprite(i, ph) {
    let row = boulderCache[ph]; if (!row) row = boulderCache[ph] = {};
    if (row[i]) return row[i];
    const f = i/(ONIX_N-1); const r = onixR(f)*1.08; const half = Math.ceil(r*1.6)+4;
    const cv = document.createElement("canvas"); cv.width=cv.height=half*2; const gg=cv.getContext("2d"); const cx=half, cy=half;
    const base = ph>=3?"#6e5f57":ph>=2?"#7c736a":"#8a8074"; const light = ph>=3?"#9a8579":"#b3a795";
    const lx = cx+LIGHT.x*r*0.5, ly = cy+LIGHT.y*r*0.5; const grad = gg.createRadialGradient(lx,ly,r*0.15,cx,cy,r*1.18);
    grad.addColorStop(0,light); grad.addColorStop(0.6,base); grad.addColorStop(1,"#39342e");
    gg.beginPath(); const sides=7; for (let k=0;k<sides;k++){ const a=k/sides*TAU+i*0.3; const rr2=r*(0.82+hash(i*7+k)*0.32); const px=cx+Math.cos(a)*rr2, py=cy+Math.sin(a)*rr2*0.96; k?gg.lineTo(px,py):gg.moveTo(px,py); } gg.closePath(); gg.fillStyle=grad; gg.fill();
    gg.lineWidth=2; gg.strokeStyle="#2c2823"; gg.stroke();
    gg.save(); gg.clip(); const la=Math.atan2(LIGHT.y,LIGHT.x); gg.strokeStyle="rgba(255,240,210,.22)"; gg.lineWidth=3; gg.beginPath(); gg.arc(cx,cy,r*0.78,la-1.1,la+0.5); gg.stroke(); gg.restore();
    row[i] = { canvas: cv, half }; return row[i];
  }

  // ===========================================================================
  // SPECIES ROSTER (render + stats + movesets)
  // ===========================================================================
  // Move element tags: 'fire'/'water'/'grass' = elemental (type math), null = physical.
  // posture/dmg here are BASE values; the engine applies type + punish multipliers once.
  const ROSTER = ["charmander", "squirtle", "bulbasaur", "charizard", "blastoise", "venusaur"];
  const SPECIES = {
    charmander: {
      name: "Charmander", type: "Fire", element: "fire", scale: 1.0,
      hp: 100, speed: 182, dodgeCost: 20, regen: 0.045,
      light: { name: "Claw Slash", el: null, dmg: 10, posture: 10, range: 70, sta: 8 },
      heavy: { name: "Searing Rake", el: null, dmg: 26, posture: 30, range: 95, sta: 18 },
      specials: [{ slot: "I", name: "Ember", kind: "cone", el: "fire", dmg: 18, posture: 24, range: 200, arc: 0.95, active: 250, cd: 3000, sta: 21 }],
      draw: dCharmander,
    },
    squirtle: {
      name: "Squirtle", type: "Water", element: "water", scale: 1.05,
      hp: 115, speed: 162, dodgeCost: 20, regen: 0.04,
      light: { name: "Bubble Jab", el: "water", dmg: 11, posture: 11, range: 74, sta: 9 },
      heavy: { name: "Aqua Tail", el: "water", dmg: 24, posture: 28, range: 92, sta: 26 },
      specials: [{ slot: "I", name: "Water Gun", kind: "projectile", el: "water", dmg: 16, posture: 22, count: 1, spread: 0, speed: 540, range: 320, pr: 7, cd: 3400, sta: 19 }],
      draw: dSquirtle,
    },
    bulbasaur: {
      name: "Bulbasaur", type: "Grass", element: "grass", scale: 0.95,
      hp: 108, speed: 162, dodgeCost: 22, regen: 0.04,
      light: { name: "Tackle", el: null, dmg: 10, posture: 11, range: 66, sta: 11 },
      heavy: { name: "Vine Whip", el: "grass", dmg: 24, posture: 28, range: 104, sta: 29 },
      specials: [{ slot: "I", name: "Razor Leaf", kind: "projectile", el: "grass", dmg: 6, posture: 8, count: 3, spread: 0.16, speed: 560, range: 360, pr: 9, cd: 2600, sta: 18 }],
      draw: dBulbasaur,
    },
    charizard: {
      name: "Charizard", type: "Fire/Flying", element: "fire", scale: 1.8, fly: true, dodgeVel: 600,
      hp: 130, speed: 196, dodgeCost: 24, regen: 0.04,
      light: { name: "Slash & Bite", el: null, dmg: 15, posture: 11, range: 96, sta: 12 },
      heavy: { name: "Seismic Tail", el: null, dmg: 34, posture: 34, range: 112, sta: 30 },
      specials: [
        { slot: "U", name: "Flamethrower", kind: "cone", el: "fire", dmg: 36, posture: 22, range: 270, arc: 0.5, active: 340, cd: 2600, sta: 24 },
        { slot: "I", name: "Fire Blast", kind: "charge", sub: "blast", el: "fire", dmg: 58, posture: 30, charge: 560, speed: 360, pr: 24, range: 460, cd: 5200, sta: 34 },
        { slot: "O", name: "Fly", kind: "dash", el: null, dmg: 18, posture: 12, cd: 4200, sta: 20 },
      ],
      draw: dCharizard,
    },
    blastoise: {
      name: "Blastoise", type: "Water", element: "water", scale: 1.95, dodgeVel: 700, dodgeEl: "water",
      hp: 170, speed: 168, dodgeCost: 24, regen: 0.045,
      light: { name: "Cannon Jab", el: "water", dmg: 12, posture: 11, range: 82, sta: 12 },
      heavy: { name: "Twin Cannon Slam", el: "water", dmg: 30, posture: 29, range: 104, sta: 32 },
      specials: [
        { slot: "U", name: "Hydro Pump", kind: "charge", sub: "beam", el: "water", dmg: 40, posture: 34, charge: 640, beamLen: 320, beamW: 26, active: 360, cd: 6200, sta: 34 },
        { slot: "I", name: "Rapid Spin", kind: "aoe", el: "water", dmg: 18, posture: 20, radius: 96, active: 260, cd: 3400, sta: 24 },
        { slot: "O", name: "Withdraw", kind: "guard", el: null, dur: 1100, parry: 220, cd: 7000, sta: 18 },
      ],
      draw: dBlastoise,
    },
    venusaur: {
      name: "Venusaur", type: "Grass/Poison", element: "grass", scale: 1.9,
      hp: 150, speed: 138, dodgeCost: 26, regen: 0.034,
      light: { name: "Vine Whip", el: "grass", dmg: 12, posture: 13, range: 118, sta: 12 },
      heavy: { name: "Petal Slam", el: "grass", dmg: 28, posture: 28, range: 104, sta: 30 },
      specials: [
        { slot: "U", name: "Razor Leaf", kind: "projectile", el: "grass", dmg: 6, posture: 6, count: 5, spread: 0.32, speed: 420, range: 360, pr: 7, cd: 2600, sta: 18 },
        { slot: "I", name: "Synthesis", kind: "heal", el: null, dur: 650, heal: 38, cd: 9000, sta: 0 },
        { slot: "O", name: "Solar Beam", kind: "charge", sub: "beam", el: "grass", dmg: 60, posture: 34, charge: 1000, beamLen: 360, beamW: 26, active: 320, cd: 7000, sta: 34 },
      ],
      draw: dVenusaur,
    },
  };

  // ===========================================================================
  // Entities
  // ===========================================================================
  function playerStart(sid) {
    sid = sid || (p && p.sid) || "charmander";
    const sp = SPECIES[sid];
    return {
      sid, sp, x: 280, y: 372, r: 14, hp: sp.hp, maxHp: sp.hp, hpShown: sp.hp,
      stamina: 100, maxStamina: 100, focus: 0, maxFocus: 100,
      faceX: 1, faceY: 0, dir: 1, moving: false,
      dodge: 0, inv: 0, vx: 0, vy: 0,
      atk: null, cast: null, dash: null, guard: null, heal: null, beam: null,
      cd: { U: 0, I: 0, O: 0 }, refunded: { U: false, I: false, O: false }, regenLock: 0, empower: 0,
      combo: 0, comboT: 0, chain: 0, dead: 0, just: 0,
    };
  }
  const bossStart = () => ({ x: 650, y: 312, hp: 360, maxHp: 360, hpShown: 360, face: -1, posture: 0, maxPosture: 120, lastHit: 999, state: "idle", timer: 1100, tellTotal: 1, move: null, target: { x: 0, y: 0 }, hit: false, phase: 1, broken: 0, flash: 0 });
  let p = playerStart("charmander");
  let b = bossStart();

  // ===========================================================================
  // Onix telegraphs
  // ===========================================================================
  function zone(kind, prog, pathFn) {
    pathFn();
    if (kind === "active") {
      g.fillStyle = "rgba(239,72,64,.42)"; g.fill();
      g.save(); g.globalCompositeOperation = "lighter"; g.strokeStyle = "rgba(255,120,90,.40)"; g.lineWidth = 12; g.stroke(); g.restore();
      g.strokeStyle = "rgba(255,205,185,.95)"; g.lineWidth = 5; g.setLineDash([7,7]); g.lineDashOffset = -time*0.2; g.stroke(); g.setLineDash([]);
    } else {
      const a = 0.07 + prog*0.28; g.fillStyle = `rgba(236,150,80,${a})`; g.fill();
      g.save(); g.globalCompositeOperation = "lighter"; g.strokeStyle = `rgba(255,180,90,${0.18+prog*0.22})`; g.lineWidth = (2+prog*2.5)+8; g.stroke(); g.restore();
      g.strokeStyle = `rgba(255,205,130,${0.45+prog*0.5})`; g.lineWidth = 2+prog*2.5; g.setLineDash([10,8]); g.lineDashOffset = -time*0.05; g.stroke(); g.setLineDash([]);
    }
  }
  const moves = {

    drawSlash();
    if (p.combo >= 2) { // combo counter floating by the player
      g.save(); g.translate(p.x + 26*sc, p.y - 30*sc); const cs2 = 1 + comboPop * 0.55; g.scale(cs2, cs2);
      g.globalAlpha = clamp(0.45 + p.comboT/820, 0, 1); g.textAlign = "center";
      const col = p.combo >= 10 ? "255,110,80" : p.combo >= 6 ? "255,180,80" : "255,238,200";
      g.font = "bold 22px ui-monospace, monospace"; g.lineWidth = 4; g.strokeStyle = "rgba(0,0,0,.75)";
      g.strokeText(p.combo + "×", 0, 0); g.fillStyle = `rgba(${col},1)`; g.fillText(p.combo + "×", 0, 0);
      g.font = "bold 8px ui-monospace, monospace"; g.fillStyle = `rgba(${col},.85)`; g.fillText("COMBO", 0, 11);
      g.restore(); g.textAlign = "left"; g.globalAlpha = 1;
    }
  }
  function drawBeam() {
    const bm = p.beam; const a = { x: bm.ax, y: bm.ay }; const k = clamp(bm.t/bm.dur,0,1); const ox=p.x, oy=p.y-6; const ex=ox+a.x*bm.len, ey=oy+a.y*bm.len;
    g.save(); g.globalCompositeOperation="lighter";
    const c1 = bm.el==="grass"?"120,210,120":"120,180,235"; const c2 = bm.el==="grass"?"240,255,200":"235,248,255";
    const grad = g.createLinearGradient(ox,oy,ex,ey); grad.addColorStop(0,`rgba(${c2},${0.9*k})`); grad.addColorStop(1,`rgba(${c1},${0.2*k})`);
    g.strokeStyle = grad; g.lineWidth = bm.w*(0.7+0.3*k); g.lineCap="round"; g.beginPath(); g.moveTo(ox,oy); g.lineTo(ex,ey); g.stroke();
    g.strokeStyle = `rgba(${c2},${k})`; g.lineWidth = bm.w*0.4; g.beginPath(); g.moveTo(ox,oy); g.lineTo(ex,ey); g.stroke();
    g.drawImage(glowFor(bm.el), ox-22, oy-22, 44, 44);
    g.restore();
  }

  function drawShots() {
    for (const s of shots) {
      if (s.kind === "lance") { g.save(); g.translate(s.x,s.y); g.globalCompositeOperation="lighter"; g.drawImage(GLOW_COOL,-s.r*2.4,-s.r*2.4,s.r*4.8,s.r*4.8); g.rotate(s.angle); g.fillStyle="rgba(120,180,235,.8)"; g.beginPath(); g.ellipse(0,0,s.r*2.3,s.r*0.85,0,0,TAU); g.fill(); g.fillStyle="rgba(235,248,255,.98)"; g.beginPath(); g.ellipse(s.r*0.5,0,s.r*1.4,s.r*0.42,0,0,TAU); g.fill(); g.restore(); }
      else if (s.kind === "leaf") { g.save(); g.translate(s.x,s.y); g.globalCompositeOperation="lighter"; g.globalAlpha=0.7; g.drawImage(GLOW_GRASS,-s.r*2,-s.r*2,s.r*4,s.r*4); g.globalAlpha=1; g.globalCompositeOperation="source-over"; g.rotate(s.rot); g.fillStyle="#7fd89a"; g.beginPath(); g.moveTo(0,-s.r*1.3); g.quadraticCurveTo(s.r,0,0,s.r*1.3); g.quadraticCurveTo(-s.r,0,0,-s.r*1.3); g.closePath(); g.fill(); g.strokeStyle="#2f7d52"; g.lineWidth=1.2; g.stroke(); g.beginPath(); g.moveTo(0,-s.r*1.1); g.lineTo(0,s.r*1.1); g.stroke(); g.restore(); }
      else if (s.kind === "blast") { g.save(); g.translate(s.x,s.y); g.globalCompositeOperation="lighter"; g.drawImage(GLOW_WARM,-s.r*1.6,-s.r*1.6,s.r*3.2,s.r*3.2); g.rotate(s.rot); g.fillStyle="rgba(255,140,30,.9)"; ci(0,0,s.r,"rgba(255,140,30,.9)"); g.fillStyle="rgba(255,235,180,.95)"; ci(0,0,s.r*0.5,"rgba(255,235,180,.95)"); g.restore(); }
    }
  }

  // ===========================================================================
  // Particle / text render
  // ===========================================================================
  function drawFx() {
    g.save(); g.globalCompositeOperation = "lighter";
    for (const o of fx) { if (o.type === "ring") { const k=1-o.life/o.max; g.strokeStyle=`rgba(${o.col},${(1-k)*0.7})`; g.lineWidth=3*(1-k)+1; g.beginPath(); g.arc(o.x,o.y,o.r0+k*o.r1,0,TAU); g.stroke(); } else if (o.type === "splash") { const k=1-o.life/o.max; g.strokeStyle=`rgba(${o.col},${(1-k)*0.7})`; g.lineWidth=2.4*(1-k)+1; g.beginPath(); g.ellipse(o.x,o.y,(o.r0+k*o.r1),(o.r0+k*o.r1)*0.4,0,0,TAU); g.stroke(); } }
    for (const o of fx) { if (o.type !== "spark" && o.type !== "ember") continue; const al=clamp(o.life/o.max,0,1); g.strokeStyle=`rgba(${o.col},${al})`; g.lineWidth=o.w||2; g.beginPath(); g.moveTo(o.x,o.y); g.lineTo(o.x-o.vx*0.03,o.y-o.vy*0.03); g.stroke(); }
    g.restore();
    for (const o of fx) { if (o.type === "debris") { const al=clamp(o.life/o.max,0,1); g.save(); g.translate(o.x,o.y); g.rotate(o.rot); g.fillStyle=`rgba(${o.col},${al})`; g.fillRect(-o.w/2,-o.w/2,o.w,o.w); g.restore(); } else if (o.type === "leaf") { const al=clamp(o.life/o.max,0,1); g.save(); g.translate(o.x,o.y); g.rotate(o.rot); g.fillStyle=`rgba(${o.col},${al})`; g.beginPath(); g.moveTo(0,-o.w); g.quadraticCurveTo(o.w,0,0,o.w); g.quadraticCurveTo(-o.w,0,0,-o.w); g.closePath(); g.fill(); g.restore(); } }
    g.textAlign = "center";
    for (const o of texts) { const al=clamp(o.life/o.max,0,1); const age=o.max-o.life; const pop=age<120?1.45-(age/120)*0.45:1; g.save(); g.translate(o.x,o.y); g.scale(pop,pop); g.font=`bold ${o.size}px ui-monospace, monospace`; g.lineWidth=4; g.strokeStyle=`rgba(0,0,0,${al*0.7})`; g.strokeText(o.txt,0,0); g.fillStyle=`rgba(${o.rgb},${al})`; g.fillText(o.txt,0,0); g.restore(); }
    g.textAlign = "left";
  }

  // ===========================================================================
  // Post
  // ===========================================================================
  function drawPost() {
    bgx.clearRect(0,0,bloomC.width,bloomC.height); bgx.filter="brightness(0.5) contrast(3.2) saturate(1.2)"; bgx.drawImage(c,0,0,bloomC.width,bloomC.height); bgx.filter="none";
    g.save(); g.globalCompositeOperation="lighter"; g.filter="blur(5px)"; g.globalAlpha=0.34; g.drawImage(bloomC,0,0,W,H); g.filter="none"; g.globalAlpha=1; g.restore();
    g.save(); g.globalCompositeOperation="multiply"; g.fillStyle="rgba(150,180,205,0.10)"; g.fillRect(0,0,W,H); g.globalCompositeOperation="overlay"; g.fillStyle="rgba(255,170,90,0.06)"; g.fillRect(0,0,W,H); g.restore();
    g.fillStyle=VIGNETTE; g.fillRect(0,0,W,H);
    if (flash>0){ g.fillStyle=`rgba(255,255,255,${Math.min(0.55,flash/420)})`; g.fillRect(0,0,W,H); }
    if (p.just>0){ const a=(p.just/700)*0.25; const r=g.createRadialGradient(W/2,H*0.52,H*0.25,W/2,H*0.52,H*0.95); r.addColorStop(0,"rgba(80,170,255,0)"); r.addColorStop(1,`rgba(80,170,255,${a})`); g.fillStyle=r; g.fillRect(0,0,W,H); }
    if (b.state==="active"){ const dp=0.1+0.06*Math.sin(time*0.04); g.save(); g.globalAlpha=dp; g.fillStyle=BOSS_VIGNETTE; g.fillRect(0,0,W,H); g.restore(); }
    if (p.hp<p.maxHp*0.3 && !p.dead){ const lp=0.1+0.1*Math.sin(time*0.012); g.save(); g.globalAlpha=lp; g.fillStyle=LOWHP_VIGNETTE; g.fillRect(0,0,W,H); g.restore(); }
    if (p.dead){ g.fillStyle=`rgba(20,0,0,${0.55*(1-p.dead/1600)+0.2})`; g.fillRect(0,0,W,H); g.textAlign="center"; g.fillStyle="#ff6b5b"; g.font="bold 40px ui-monospace, monospace"; g.fillText(p.sp.name.toUpperCase()+" FELL", W/2, H/2-6); g.fillStyle="#cbd6dd"; g.font="14px ui-monospace, monospace"; g.fillText("No coins, XP, or progress lost — stepping back in…", W/2, H/2+22); g.textAlign="left"; }
    if (winT > 0 && !p.dead){ const a=clamp(winT/1900,0,1); g.fillStyle=`rgba(8,12,8,${0.28*a})`; g.fillRect(0,0,W,H); g.textAlign="center"; g.fillStyle="#eccb73"; g.font="bold 44px ui-monospace, monospace"; g.fillText("VICTORY", W/2, H/2-6); g.fillStyle="#dfeaf0"; g.font="15px ui-monospace, monospace"; g.fillText(p.sp.name + " defeated Giovanni's Onix", W/2, H/2+24); g.textAlign="left"; }
    if (introT>0){ const a=clamp(introT/600,0,1); g.save(); g.globalAlpha=Math.min(1,a); g.textAlign="center"; g.fillStyle="rgba(8,12,16,.6)"; g.fillRect(0,H*0.30,W,72); g.fillStyle="#eccb73"; g.font="bold 28px ui-monospace, monospace"; g.fillText(p.sp.name.toUpperCase()+"  vs  GIOVANNI'S ONIX", W/2, H*0.30+34); g.fillStyle="#9fb6c2"; g.font="13px ui-monospace, monospace"; g.fillText(typeLine(), W/2, H*0.30+56); g.restore(); g.textAlign="left"; }
    if (padHintT>0){ const a=clamp(padHintT/800,0,1); g.save(); g.globalAlpha=Math.min(1,a); g.textAlign="center"; rr(W/2-322,88,644,22,6); g.fillStyle="rgba(8,14,18,.82)"; g.fill(); g.strokeStyle="rgba(120,200,180,.4)"; g.lineWidth=1; g.stroke(); g.fillStyle="#a9ddcb"; g.font="11px ui-monospace, monospace"; g.fillText("🎮  A light · X heavy · B dodge · Y / LB / RB specials · LT / RT swap Pokémon · Start retry", W/2, 103); g.restore(); g.textAlign="left"; }
  }
  function typeLine() { const e = p.sp.element; if (e === "fire") return "Fire is resisted by Onix — out-aggress it: fastest, hardest-hitting, shortest cooldowns"; if (e === "water" || e === "grass") return e[0].toUpperCase()+e.slice(1)+" is super-effective — bonus posture + cooldown refunds on specials"; return ""; }

  // ===========================================================================
  // HUD
  // ===========================================================================
  function bar(x,y,w,h,val,max,col,opt) {
    opt = opt||{}; rr(x,y,w,h,h/2); g.fillStyle="rgba(6,10,14,.85)"; g.fill(); g.lineWidth=1; g.strokeStyle="rgba(120,160,180,.30)"; g.stroke();
    const f=clamp(val/max,0,1); if (opt.trail!=null){ const tf=clamp(opt.trail/max,0,1); if (tf>f+0.001){ rr(x+2,y+2,(w-4)*tf,h-4,(h-4)/2); g.fillStyle=`rgba(${opt.tcol||"255,255,255"},.5)`; g.fill(); } }
    if (f>0){ rr(x+2,y+2,(w-4)*f,h-4,(h-4)/2); g.fillStyle=col; g.fill(); rr(x+2,y+2,(w-4)*f,(h-4)*0.5,(h-4)/4); g.fillStyle="rgba(255,255,255,.18)"; g.fill(); }
  }
  const TYPECOL = { Fire:"#ef7a3a", Water:"#4aa8e0", Grass:"#5fc07a", "Fire/Flying":"#ef7a3a", "Grass/Poison":"#5fc07a" };
  function drawHud() {
    // player (top-left)
    g.textAlign="left"; g.font="bold 12px ui-monospace, monospace"; g.fillStyle="#e7eef3"; g.fillText(p.sp.name.toUpperCase(), 26, 22);
    g.fillStyle=TYPECOL[p.sp.type]||"#9fb6c2"; g.font="10px ui-monospace, monospace"; g.fillText(p.sp.type, 26, 35);
    g.fillStyle="#9fb6c2"; g.font="11px ui-monospace, monospace"; g.textAlign="right"; g.fillText(Math.ceil(p.hp)+"/"+p.maxHp, 256, 22); g.textAlign="left";
    bar(24,40,232,13,p.hp,p.maxHp,"#5fd36e",{trail:p.hpShown,tcol:"255,210,90"});
    bar(24,58,176,7,p.stamina,p.maxStamina,p.stamina<24?"#ef5148":"#e9c45f");
    bar(24,70,140,6,p.focus,p.maxFocus,"#67c9ff");
    // special slots
    let sx = 24, sy = 84;
    for (const s of p.sp.specials) { drawSlot(sx, sy, s); sx += 92; }
    // boss (top-center)
    const bw=420, bx=W/2-bw/2, by=30; g.textAlign="center"; g.font="bold 15px ui-monospace, monospace"; g.fillStyle="#e7eef3"; g.fillText("GIOVANNI'S ONIX", W/2, by-8);
    for (let i=0;i<3;i++){ const px=bx+bw-8-i*15, py=by-13; g.save(); g.translate(px,py); g.rotate(Math.PI/4); g.fillStyle = i<b.phase ? (b.phase>=3?"#ef5148":b.phase>=2?"#eccb73":"#9fb6c2") : "rgba(120,150,170,.25)"; g.fillRect(-4,-4,8,8); g.restore(); }
    bar(bx,by,bw,13,b.hp,b.maxHp,"#ef5148",{trail:b.hpShown,tcol:"255,150,60"});
    const pcol = b.posture>b.maxPosture*0.8 ? `rgba(255,216,107,${0.7+0.3*Math.sin(time*0.02)})` : "#cfc7b0"; bar(bx+bw*0.14,by+18,bw*0.72,8,b.posture,b.maxPosture,pcol);
    g.font="9px ui-monospace, monospace"; g.fillStyle="#7f97a6"; g.fillText("POSTURE", W/2, by+35);
    drawSelectStrip();
    // log
    rr(24,H-30,W-48,22,6); g.fillStyle="rgba(7,11,15,.82)"; g.fill(); g.strokeStyle="rgba(120,160,180,.3)"; g.lineWidth=1; g.stroke();
    g.textAlign="left"; g.fillStyle="#dfeaf0"; g.font="12px ui-monospace, monospace"; g.fillText(log, 36, H-15);
    g.textAlign="right"; g.fillStyle="#7f97a6"; g.font="10px ui-monospace, monospace"; g.fillText(`${padConnected?"🎮  ":""}FALLS ${falls}   WINS ${wins}`, W-36, H-15); g.textAlign="left";
  }
  function drawSlot(x, y, s) {
    const cd = p.cd[s.slot], cdmax = (p.cd._max && p.cd._max[s.slot]) || s.cd; const ready = cd <= 0;
    g.fillStyle = ready ? "rgba(20,32,40,.9)" : "rgba(14,20,26,.9)"; rr(x,y,84,18,4); g.fill(); g.strokeStyle = ready ? "rgba(120,200,255,.5)" : "rgba(90,110,125,.4)"; g.lineWidth=1; g.stroke();
    g.fillStyle = ready ? "#cfe6ff" : "#5d7180"; g.font="bold 10px ui-monospace, monospace"; g.textAlign="left"; g.fillText(s.slot, x+6, y+12);
    g.fillStyle = ready ? "#dfeaf0" : "#6f8493"; g.font="9px ui-monospace, monospace"; g.fillText(s.name, x+18, y+12);
    if (!ready) { const f=clamp(cd/cdmax,0,1); g.fillStyle="rgba(90,140,180,.25)"; rr(x+1,y+1,82*f,16,3); g.fill(); g.fillStyle="#9fc0d8"; g.textAlign="right"; g.font="9px ui-monospace, monospace"; g.fillText(Math.ceil(cd/1000)+"s", x+80, y+12); g.textAlign="left"; }
  }
  function drawSelectStrip() {
    const n = ROSTER.length, cw = 118, gap = 6, totalW = n*cw + (n-1)*gap, x0 = W/2 - totalW/2, y = H-78, ch = 42;
    for (let i=0;i<n;i++){ const sid=ROSTER[i], sp=SPECIES[sid], x=x0+i*(cw+gap), active=sid===p.sid;
      g.fillStyle = active ? "rgba(28,44,56,.92)" : "rgba(12,18,24,.78)"; rr(x,y,cw,ch,6); g.fill(); g.strokeStyle = active ? (TYPECOL[sp.type]||"#cfe6ff") : "rgba(90,110,125,.35)"; g.lineWidth = active?2:1; g.stroke();
      // mini render
      g.save(); g.beginPath(); rr(x+2,y+2,38,ch-4,5); g.clip(); g.translate(x+21, y+ch*0.62); const ms = (sp.scale>1.4) ? 0.6 : 0.9; g.scale(ms, ms); lowDetail = true; sp.draw(); lowDetail = false; g.restore();
      g.textAlign="left"; g.fillStyle = active ? "#eef6ff" : "#aebfca"; g.font="bold 10px ui-monospace, monospace"; g.fillText((i+1)+" "+sp.name, x+44, y+16);
      g.fillStyle = TYPECOL[sp.type]||"#7f97a6"; g.font="8px ui-monospace, monospace"; g.fillText(sp.type, x+44, y+27);
      g.fillStyle = active?"#8fb0c4":"#5d7180"; g.font="8px ui-monospace, monospace"; g.fillText(sp.specials.length===1?"1 special":"3 specials", x+44, y+37);
    }
    // click support handled via canvas listener
    g._selStrip = { x0, y, cw, gap, ch, n };
  }
  c.addEventListener("click", e => {
    const rect = c.getBoundingClientRect(); const mx = (e.clientX-rect.left)/rect.width*W, my = (e.clientY-rect.top)/rect.height*H; const s = g._selStrip; if (!s) return;
    if (my >= s.y && my <= s.y+s.ch) { for (let i=0;i<s.n;i++){ const x=s.x0+i*(s.cw+s.gap); if (mx>=x && mx<=x+s.cw) { selectMon(ROSTER[i]); break; } } }
  });

  // ===========================================================================
  // Main loop
  // ===========================================================================
  function loop(now) {
    time = now; let dt = Math.min(32, now-tPrev); tPrev = now; if (hitstop>0){ hitstop -= dt; dt *= 0.04; } dt *= slow;
    pollPad();
    spinePts = onixSpine();   // one body shape per frame, shared by hit-detection + rendering
    playerUpdate(dt); bossThink(dt); updateShots(dt); updateFx(dt);
    g.save();
    g.translate(camX+kickX, camY+kickY); g.scale(zoom,zoom); g.translate(-(camX+kickX), -(camY+kickY)); if (shake) g.translate(rnd(-shake,shake), rnd(-shake,shake));
    drawArena();
    if (b.move && (b.state==="tell"||b.state==="active")){ const prog = b.state==="tell" ? clamp(1-b.timer/(b.tellTotal||b.move.tell),0,1) : clamp(1-b.timer/b.move.active,0,1); b.move.draw(b.state, prog); }
    drawOnix(); drawPlayer(); drawShots(); drawFx();
    g.restore();
    drawPost(); drawHud();
    requestAnimationFrame(loop);
  }
  reset("Giovanni sends out Onix. Pick a Pokémon (1–6). Read the tell, dodge late, punish.");
  requestAnimationFrame(loop);
  </script>
</body>
